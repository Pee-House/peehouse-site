<!DOCTYPE html>
<html>
<head>
    <title>P-House Discord Community</title>

    <meta property="og:title" content="Pee House">
    <meta property="og:description" content="Bring a change of clothes! A comfy and inclusive pee kink space for like-minded dorks. (18+ ONLY)">
    <meta property="og:image" content="https://pee.house/assets/PissYourself.gif">
    <meta name="theme-color" content="#DDD618">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            padding: 20px;
        }
        #stats-data {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>Pee House Discord Community</h1>

    <div id="server-stats" style="max-width: 700px; margin-bottom: 1rem;">
        <h2>Live server statistics</h2>
        <div id="stats-loading">Loading server statistics…</div>
        <pre id="stats-data" style="display: none;"></pre>
    </div>

    <iframe src="https://discord.com/widget?id=1178054988266737784&theme=dark"
            width="700" height="1000"
            allowtransparency="true"
            frameborder="10"
            sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>

    <script>
        const API_BASE_URL = 'https://raw.githubusercontent.com/Pee-House/peehouse-site/main/stats.json';

        async function loadServerStats() {
            const statsLoading = document.getElementById('stats-loading');
            const statsData = document.getElementById('stats-data');

            try {
                const response = await fetch(API_BASE_URL, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }

                const data = await response.json();

                statsLoading.style.display = 'none';
                statsData.style.display = 'block';

                statsData.textContent = JSON.stringify(data, null, 2);

            } catch (error) {
                statsLoading.textContent = 'Unable to load server statistics.\n' + error;
            }
        }

        loadServerStats();
    </script>

</body>
</html>
