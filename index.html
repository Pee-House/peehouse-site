<!DOCTYPE html>
<html>
<head>
    <title>Welcome to the Pee House</title>

    <meta property="og:title" content="Pee House">
    <meta property="og:description" content="Bring a change of clothes! A comfy and inclusive pee kink space for like-minded dorks. (18+ ONLY)">
    <meta property="og:image" content="https://pee.house/assets/PissYourself.gif">
    <meta name="theme-color" content="#DDD618">

    <style>
        body {
            font-family: 'Comic Sans MS', ComicSans;
            background: #111;
            color: #d0d70d;
            padding: 20px;
        }

        .stats-card {
            background: #1c1c1c;
            padding: 20px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #333;
            max-width: 700px;
        }

        .stats-title {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #DDD618;
        }

        .stat-line {
            margin: 4px 0;
            font-size: 1rem;
        }

        .stat-label {
            font-weight: bold;
            color: #f0e68c;
        }

        #stats-loading {
            margin-top: 10px;
            font-style: italic;
        }

        .join-button {
            display: inline-block;
            margin-bottom: 16px;
            padding: 12px 20px;
            border-radius: 999px;
            background: #DDD618;
            color: #111;
            font-weight: bold;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .join-button:hover {
            background: #ffeb3b;
        }
    </style>
</head>

<body>
    <h1>Pee House Discord Community</h1>

    <div id="website-join"></div>
    <div id="server-stats">
        <div id="stats-loading">Loading server statistics…</div>
        <div id="stats-container"></div>
    </div>

    <iframe src="https://discord.com/widget?id=1178054988266737784&theme=dark"
            width="350" height="500"
            allowtransparency="true"
            frameborder="25"
            sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>

    <script>
        const API_BASE_URL = 'https://raw.githubusercontent.com/Pee-House/peehouse-site/main/stats.json';
        const TARGET_GUILD_ID = '1178054988266737784';

        async function loadServerStats() {
            const loading = document.getElementById('stats-loading');
            const container = document.getElementById('stats-container');

            try {
                const response = await fetch(API_BASE_URL, { cache: "no-store" });
                if (!response.ok) throw new Error("HTTP " + response.status);

                const data = await response.json();

                loading.style.display = 'none';

                const g = data[TARGET_GUILD_ID];
                if (!g) {
                    loading.style.display = 'block';
                    loading.textContent = 'Stats not found for this server.';
                    return;
                }

                const card = document.createElement('div');
                card.className = 'stats-card';

                let vcLine = "";
                if (g.voice_members > 0) {
                    vcLine = `<div class="stat-line"><span class="stat-label">In VC:</span> ${g.voice_members}</div>`;
                }

                let inviteLine = "";
                if (g.invite_url) {
                    inviteLine = `<div class="stat-line"><a class="join-button" href="${g.invite_url}" target="_blank" rel="noopener">Join Pee House</a></div>`;
                    document.getElementById('website-join').innerHTML = inviteLine;
                }

                card.innerHTML = `
                    <div class="stat-line"><span class="stat-label">Total members:</span> ${g.human_members}</div>
                    <div class="stat-line"><span class="stat-label">Verified:</span> ${g.verified_members}</div>
                    <div class="stat-line"><span class="stat-label">Online:</span> ${g.online_members}</div>
                    ${vcLine}

                    <br>

                    <div class="stat-line"><span class="stat-label">Active last 24h:</span> ${g.activity.recent_24h ?? 'N/A'}</div>
                    <div class="stat-line"><span class="stat-label">Active last 7d:</span> ${g.activity.recent_7d ?? 'N/A'}</div>
                    <div class="stat-line"><span class="stat-label">Active last 30d:</span> ${g.activity.recent_30d ?? 'N/A'}</div>
                `;

                container.appendChild(card);

            } catch (error) {
                loading.textContent = 'Unable to load server statistics.\n' + error;
            }
        }

        loadServerStats();
    </script>

</body>
</html>
